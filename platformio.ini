; Waveshare ESP32-S3-RS485-CAN — CCMODBUS replacement for HIMOINSA CEx7
; Open this folder (project root) in PlatformIO / Cursor.
[env:esp32-s3-rs485-can]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  -DCORE_DEBUG_LEVEL=1
  ; Listen-only CAN while sniffing beside existing CCMODBUS (set 0 later for TX)
  -DCAN_LISTEN_ONLY=1
  ; Set to 1 to hex-dump every CAN frame (very noisy)
  -DCAN_LOG_EVERY_FRAME=0
  ; Fuel reverse-engineering: search payloads for this tank percent
  -DFUEL_HUNT_PERCENT=71
  -DFUEL_HUNT_ENABLE=0
  ; Start/Stop coil hunt: print payload diffs when genset run state changes
  -DRUN_STATE_HUNT_ENABLE=0

lib_deps =
  emelianov/modbus-esp8266 @ ^4.1.0
